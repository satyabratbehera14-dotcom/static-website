<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet">

  <title>College Enrollment Form</title>

  <style>
    body {
      background: #dcdcdc;
      font-family: Arial, sans-serif;
    }

    /* Header */
    .header {
      background: #4a5d73;
      color: white;
      padding: 30px;
      text-align: center;
      position: relative;
    }

    /* Logo Box */
    .logo-box {
      position: absolute;
      left: 20px;
      top: -30px;
      background: #243b55;
      width: 150px;
      height: 200px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      color: white;
      border: none !important;
  box-shadow: none !important;
  background: transparent;

    }

    /* Main Form */
    .form-box {
      max-width: 900px;
      margin: 30px auto;
      background: #e9edf2;
      padding: 30px;
      border: 1px solid #999;
    }

    label {
      font-weight: bold;
      color: #2c3e50;
    }

    .form-control {
      background: #cfd6e0;
      border: none;
      border-radius: 0;
    }

    .small-text {
      font-size: 12px;
      color: #555;
    }

    .signature-line {
      border-top: 1px solid #000;
      width: 200px;
      margin-top: 40px;
    }

    .footer-bar {
      height: 30px;
      background: #4a5d73;
    }
    .logo-img{
display:block;
  border: none !important;
  outline: none !important;
  display: block;
  margin: auto;
   width: 200px;
  height: 250px;
  object-fit: cover;
  object-position: center;
  clip-path: inset(0 0 10px 30px);
    }
  </style>
</head>

<body>

<!-- Header -->
<div class="header">

  <!-- Logo -->
  <div class="logo-box">
    <img src="flower.jpeg" class="logo-img" width="60" class="mb-2">

  </div>

  <h2>College Enrollment Form</h2>
  <p>Complete the registration form with attention to detail</p>
</div>

<!-- Form -->
<div class="form-box">

<form>

  <!-- Name -->
  <div class="row mb-3">
    <div class="col-md-3"><label>Full Name</label></div>
    <div class="col-md-4">
      <input class="form-control">
      <div class="small-text">First Name</div>
    </div>
    <div class="col-md-4">
      <input class="form-control">
      <div class="small-text">Last Name</div>
    </div>
  </div>

  <!-- Address -->
  <div class="row mb-3">
    <div class="col-md-3"><label>Address</label></div>
    <div class="col-md-9">
      <input class="form-control mb-2">
      <div class="small-text">Street Address</div>

      <div class="row mt-2">
        <div class="col-md-6">
          <input class="form-control">
          <div class="small-text">City</div>
        </div>
        <div class="col-md-6">
          <input class="form-control">
          <div class="small-text">State/Province</div>
        </div>
      </div>
    </div>
  </div>

  <!-- Birth Date -->
  <div class="row mb-3">
    <div class="col-md-3"><label>Birth Date</label></div>
    <div class="col-md-3">
      <input class="form-control">
      <div class="small-text">Date</div>
    </div>
    <div class="col-md-3">
      <input class="form-control">
      <div class="small-text">Month</div>
    </div>
    <div class="col-md-3">
      <input class="form-control">
      <div class="small-text">Year</div>
    </div>
  </div>

  <!-- Gender -->
  <div class="row mb-3">
    <div class="col-md-3"><label>Gender</label></div>
    <div class="col-md-9">
      <input type="radio" name="g"> Male
      <input type="radio" name="g" class="ms-3"> Female
      <input type="radio" name="g" class="ms-3"> N/A
    </div>
  </div>

  <!-- Phone -->
  <div class="row mb-3">
    <div class="col-md-3"><label>Student Number</label></div>
    <div class="col-md-9">
      <input class="form-control">
      <div class="small-text">Phone Number</div>
    </div>
  </div>

  <!-- Email -->
  <div class="row mb-3">
    <div class="col-md-3"><label>Student Email</label></div>
    <div class="col-md-9">
      <input class="form-control">
      <div class="small-text">example@example.com</div>
    </div>
  </div>

  <!-- Comments -->
  <div class="row mb-3">
    <div class="col-md-3"><label>Additional Comments</label></div>
    <div class="col-md-9">
      <textarea class="form-control" rows="3"></textarea>
    </div>
  </div>

  <!-- Art Genre -->
  <div class="row mb-4">
    <div class="col-md-3"><label>Choose the Art Genre</label></div>

    <div class="col-md-5">
      <input type="checkbox"> Dadaisme<br>
      <input type="checkbox"> Realism<br>
      <input type="checkbox"> Other
    </div>

    <div class="col-md-4 text-end">
      <div>September 30, 2024</div>
      <div class="signature-line"></div>
      <div class="mt-2">Bailey Dupont</div>
    </div>
  </div>

</form>

</div>

<!-- Footer -->
<div class="footer-bar"></div>

</body>
</html>
