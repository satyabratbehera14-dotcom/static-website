<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet">

  <title>Student Enrollment Form</title>

  <style>
    body {
      background: #e5e5e5;
      font-family: Arial, sans-serif;
    }

    .header {
      background: #1f5d87;
      color: white;
      text-align: center;
      padding: 15px;
      font-size: 28px;
      font-weight: bold;
    }

    .form-box {
      background: #efefef;
      padding: 30px;
      max-width: 900px;
      margin: auto;
      border: 1px solid #999;
    }

    .section-title {
      color: #1f5d87;
      font-weight: bold;
      margin-top: 20px;
      margin-bottom: 15px;
    }

    label {
      font-weight: 500;
    }

    .form-control {
      border: 1px solid #555;
      border-radius: 0;
    }

    .form-check-input {
      border: 1px solid #555;
    }

    .signature-box {
      width: 200px;
      height: 40px;
      border: 1px solid #555;
      background: #fff;
    }

    .footer {
      text-align: right;
      color: #1f5d87;
      font-size: 30px;
      font-weight: bold;
      margin-top: 20px;
    }

    .small-text {
      font-size: 12px;
      color: #333;
    }
  </style>
</head>

<body>

<div class="header">
  STUDENT ENROLLMENT FORMS
</div>

<div class="form-box">

<form>

  <!-- Student Info -->
  <div class="section-title">Student Information</div>

  <div class="row mb-3">
    <div class="col-md-3"><label>Student Name:</label></div>
    <div class="col-md-4">
      <input type="text" class="form-control" placeholder="First Name">
    </div>
    <div class="col-md-4">
      <input type="text" class="form-control" placeholder="Last Name">
    </div>
  </div>

  <div class="row mb-3">
    <div class="col-md-3"><label>Birth Date:</label></div>
    <div class="col-md-4">
      <input type="date" class="form-control">
    </div>
    <div class="col-md-5">
      <label class="me-2">Gender:</label>
      <input type="radio" name="gender"> Male
      <input type="radio" name="gender" class="ms-3"> Female
    </div>
  </div>

  <div class="row mb-3">
    <div class="col-md-3"><label>Student Address:</label></div>
    <div class="col-md-9">
      <input type="text" class="form-control" placeholder="Full Address">
    </div>
  </div>

  <div class="row mb-3">
    <div class="col-md-3"><label>Contact Number:</label></div>
    <div class="col-md-4">
      <input type="text" class="form-control" placeholder="(000) 000-0000">
    </div>
    <div class="col-md-2"><label>Email Address:</label></div>
    <div class="col-md-3">
      <input type="email" class="form-control" placeholder="name@example.com">
    </div>
  </div>

  <!-- Parent Info -->
  <div class="section-title">Parent/Guardian Information</div>

  <div class="row mb-3">
    <div class="col-md-3"><label>Parent/Guardian Name:</label></div>
    <div class="col-md-9">
      <input type="text" class="form-control" placeholder="Full Name">
    </div>
  </div>

  <div class="row mb-3">
    <div class="col-md-4"><label>Relationship to Student:</label></div>
    <div class="col-md-3">
      <input type="text" class="form-control" placeholder="Ex: Father/Mother">
    </div>
    <div class="col-md-2"><label>Contact Number:</label></div>
    <div class="col-md-3">
      <input type="text" class="form-control" placeholder="(000) 000-0000">
    </div>
  </div>

  <div class="row mb-3">
    <div class="col-md-3"><label>Email Address:</label></div>
    <div class="col-md-9">
      <input type="email" class="form-control">
    </div>
  </div>

  <!-- Academic Info -->
  <div class="section-title">Academic Information</div>

  <div class="row mb-3">
    <div class="col-md-4"><label>Grade/Program Applying For:</label></div>
    <div class="col-md-3">
      <input type="text" class="form-control" placeholder="Ex: 8th Grade">
    </div>
    <div class="col-md-3"><label>Previous School:</label></div>
    <div class="col-md-2">
      <input type="text" class="form-control">
    </div>
  </div>

  <!-- Consent -->
  <div class="section-title">Consent and Signature</div>

  <p class="small-text">
    I confirm that all information provided above is true and correct.
  </p>

  <div class="row align-items-center">
    <div class="col-md-4">
      <div class="signature-box"></div>
      <div class="small-text mt-2">Applicant Signature</div>
    </div>

    <div class="col-md-8 footer">
      WPS
      <div style="font-size:12px;">World Public School</div>
    </div>
  </div>

</form>

</div>

</body>
</html>
