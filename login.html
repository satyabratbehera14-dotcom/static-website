<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>LOGIN PAGE</title>
  </head>
  <body>
    <form>
      <h1>LOGIN FORM</h1>
      <table>
        <tr>
          <th>column1</th>
          <th>column2</th>
        </tr>
        <tr>
          <td>
            <label for="name">USER NAME</label>
          </td>
          <td>
            <input
              type="text"
              id="name"
              name="username"
              placeholder="enter your name"
            />
          </td>
        </tr>
        <tr>
          <td>
            <label for="password">PASSWORD</label>
          </td>
          <td>
            <input
              type="password"
              id="password"
              name="password"
              placeholder="enter your password"
            />
          </td>
        </tr>
      </table>
      <br />
      <button>
        <input type="submit" value="Submit" />
      </button>
      <button>
        <input type="reset" value="Reset" />
      </button>
      <button>
        <input type="submit" value="Cancel" />
      </button>
    </form>
    <p>
      New To The Website
      <a href="registrationfile.html">REGISTER </a>
    </p>
    <p>
        if you forgot your password
        <a href="FORGETPASSWORD.html">FORGET </a>
    </p>
    <p>
        if you want to reset your password
        <a href="RESETPASSWORD.html">RESET</a>
    </p>
  </body>
</html>
