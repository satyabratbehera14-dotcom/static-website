<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>RESET PASSWORD PAGE</title>
  </head>
  <body>
    <form>
      <h1>RESET PASSWORD FORM</h1>
      <table>
        <tr>
          <th>column1</th>
          <th>column2</th>
        </tr>
        <tr>
          <td>
            <label for="password">OLDPASSWORD</label>
          </td>
          <td>
            <input
              type="password"
              id="password"
              name="password"
              placeholder="enter your oldpassword"
            />
          </td>
        </tr>
         <tr>
          <td>
            <label for="npassword">NEWPASSWORD</label>
          </td>
          <td>
            <input
              type="password"
              id="npassword"
              name="npassword"
              placeholder="enter your newpassword"
            />
          </td>
        </tr>
         <tr>
          <td>
            <label for="rpassword">RETYPEPASSWORD</label>
          </td>
          <td>
            <input
              type="rpassword"
              id="rpassword"
              name="rpassword"
              placeholder="enter your retypepassword"
            />
          </td>
        </tr>
      </table>
      <br />
      <button>
        <input type="submit" value="Submit" />
      </button>
      <button>
        <input type="reset" value="Reset" />
      </button>
      <button>
        <input type="submit" value="Cancel" />
      </button>
    </form>
  </body>
</html>
