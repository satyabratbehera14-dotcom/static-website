<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <!-- Bootstrap CSS -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
    <title>Login Form</title>

    <style>
      body {
        background: #14b8a6;
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        font-family: Arial, sans-serif;
      }

      .login-card {
        background: #0f172a;
        color: white;
        width: 350px;
        padding: 30px;
        border-radius: 10px;
        box-shadow: 0 10px 25px rgba(0, 0, 0, 0.3);
      }

      .form-control {
        background: transparent;
        border: 1px solid #6c757d;
        color: white;
      }

      .form-control::placeholder {
        color: #adb5bd;
      }

      .form-control:focus {
        background: transparent;
        color: white;
        box-shadow: none;
        border-color: #20c997;
      }

      .btn-login {
        background: #20c997;
        color: white;
        border: none;
      }

      .btn-login:hover {
        background: #d0d9d7;
      }

      .link {
        color: #20c997;
        text-decoration: none;
        font-size: 14px;
      }

      .link:hover {
        text-decoration: underline;
      }

      .footer-text {
        text-align: center;
        margin-top: 15px;
        font-size: 13px;
        color: #444;
      }
    </style>
  </head>

  <body>
    <div>
      <div class="login-card text-center">
        <h3 class="mb-4">Login Form</h3>

        <form>
          <div class="mb-3">
<label class="form-label">Email address</label>
            <div class="input-group">
            <span class="input-group-text bg-transparent border-secondary text-light">
                <i class="bi bi-envelope-fill"></i>
            </span>
            <input
              type="email"
              class="form-control"
              placeholder="Enter Your Email"
            />
          </div>
</div>
          <div class="mb-2">
             <div class="input-group">
    <span class="input-group-text bg-transparent border-secondary text-light">
      <i class="bi bi-lock"></i>
    </span>
            <input
              type="password"
              class="form-control"
              placeholder=" Enter Your Password"
            />
          </div>
</div>
          <div class="text-start mb-3">
            <a href="FORGETPASSWORDPAGE.html" class="link">Forgot password?</a>
          </div>
<a href="ANOTHERADMINPANEL.html">
  <button type="button" class="btn btn-login w-100 mb-3">Login</button>
</a>

          <p style="font-size: 14px">
            Not a member?
            <a href="SIGNUPPAGE.html" class="link">Signup now</a>
          </p>
        </form>
      </div>

      <div class="footer-text">Made with ❤️ by Learning Robo</div>
    </div>
  </body>
</html>
