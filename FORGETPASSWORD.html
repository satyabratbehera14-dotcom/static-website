<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>FORGET PASSWORD PAGE</title>
    <style>
        .heading {background-color: aquamarine};
    </style>
    <link rel="stylesheet" href="style.css">
  </head>
  <body style="margin-left:110px; margin-right:110px">
    <div style="border:3px solid black;padding:5px">

    <form>
      <h1 style="color:rgba(226, 43, 174, 0.448); text-align:center;" class="heading">FORGET PASSWORD FORM</h1>
      <table>
        <tr>
          <th >column1</th>
          <th>column2</th>
        </tr>
        <tr>
          <td>
            <label for="email">EMAILID</label>
          </td>
          <td>
            <input
              type="email"
              id="email"
              name="email"
              placeholder="enter your emailid"
            />
          </td>
        </tr>
         <tr>
          <td>
            <label for="otp">OTP</label>
          </td>
          <td>
            <input
              type="number"
              id="number"
              name="number"
              placeholder="enter one time password"
            />
          </td>
        </tr>
      </table>
      <br />
      <button>
        <input type="submit" value="Submit" />
      </button>
      <button>
        <input type="reset" value="Reset" />
      </button>
      <button>
        <input type="submit" value="Cancel" />
      </button>
    </div>
    </form>
  </body>
</html>
