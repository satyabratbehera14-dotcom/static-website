<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet">

  <title>Signup Form</title>

  <style>
    body {
      background: #14b8a6;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: Arial, sans-serif;
    }

    .signup-card {
      background: #0f172a;
      color: white;
      width: 380px;
      padding: 30px;
      border-radius: 10px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.3);
    }

    .form-control {
      background: transparent;
      border: 1px solid #6c757d;
      color: white;
    }

    .form-control::placeholder {
      color: #adb5bd;
    }

    .form-control:focus {
      background: transparent;
      color: white;
      box-shadow: none;
      border-color: #20c997;
    }

    .btn-signup {
      background: #20c997;
      color: white;
      border: none;
    }

    .btn-signup:hover {
      background: #17a589;
    }

    .link {
      color: #20c997;
      text-decoration: none;
      font-size: 14px;
    }

    .link:hover {
      text-decoration: underline;
    }

    .footer-text {
      text-align: center;
      margin-top: 15px;
      font-size: 13px;
      color: #444;
    }
  </style>
</head>

<body>

  <div>
    <div class="signup-card text-center">
      <h3 class="mb-4">Signup Form</h3>

      <form>
        <div class="mb-3">
          <input type="text" class="form-control" placeholder="Full Name">
        </div>

        <div class="mb-3">
          <input type="email" class="form-control" placeholder="Email Address">
        </div>

        <div class="mb-3">
          <input type="password" class="form-control" placeholder="Password">
        </div>

        <div class="mb-3">
          <input type="password" class="form-control" placeholder="Confirm Password">
        </div>

        <button type="submit" class="btn btn-signup w-100 mb-3">Signup</button>

        <p style="font-size:14px;">
          Already have an account? <a href="LOGINWEBPAGE.html" class="link">Login</a>
        </p>
      </form>
    </div>

    <div class="footer-text">
      Made with ❤️ by Learning Robo
    </div>
  </div>

</body>
</html>
