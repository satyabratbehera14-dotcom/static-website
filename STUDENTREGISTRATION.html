<!doctype html>

  <head>

    <link rel="stylesheet" href="style1.css" />
  </head>
  <body>
    <div class="container">
      <h2 class="title2">PERSONAL DETAILS</h2>
      <h3 class="title1">STUDENT NAME:-</h3>
      <div class="row1">
        <label>FIRST NAME:-</label>
        <input type="text" />
        <label>MIDDLE NAME:-</label>
        <input type="text" />
        <label>LAST NAME:-</label>
        <input type="text" />
      </div>
      <h3 class="title1">FATHER NAME:-</h3>
      <div class="row1">
        <label>FIRST NAME:-</label>
        <input type="text" />
        <label>MIDDLE NAME:-</label>
        <input type="text" />
        <label>LAST NAME:-</label>
        <input type="text" />
      </div>
      <h3 class="title1">MOTHER NAME:-</h3>
      <div class="row1">
        <label>FIRST NAME:-</label>
        <input type="text" />
        <label>MIDDLE NAME:-</label>
        <input type="text" />
        <label>LAST NAME:-</label>
        <input type="text" />
      </div>
      <h2 class="title2">ADDRESS DETAILS</h2>

        <label>ADDRESS1:-</label><input type="text" /> <label>ADDRESS2:-</label

        <label>COUNTRY:-</label><input type="text" /> <label>STATE:-</label
        ><input type="text" /><label>DISTRICT:-</label><input type="text" />

      <div class="row1">
        <label>BLOCK:-</label><input type="text" /> <label>AT:-</label
        ><input type="text" /> <label>PINCODE:-</label><input type="number" />
      </div>
      <h2 class="title2">EDUCATION DETAILS</h2>
      <div class="e-column">
        <span></span>
        <span>School/college</span>
        <span>Board/University</span>
        <span>Totalmark</span>
        <span>Securedmark</span>
        <span>Percentage(%)</span>
      </div>
      <div class="e-row">
        <label>MATRICULATION:-</label>
        <input /><input /><input /><input /><input />
      </div>
      <div class="e-row">
        <label>INTERMEDIATE:-</label>
        <input /><input /><input /><input /><input />
      </div>
      <div class="e-row">
        <label>GRADUATION:-</label>
        <input /><input /><input /><input /><input />
      </div>
      <h2 class="title2">ACHIEVEMENT DETAILS</h2>
      <div class="row1">
        <input/><input /><input/><input /><input/>
        <input />
      </div>
      <div class="row1">
       <input /><input /><input /><input /><input /><input />
        
      </div>
    </div>
